USERS:
  - access_key: REPLACE_ME
    white_uid: 0
    banned_uid: 0

# The runner polls followed live streams and starts a task only after a medal
# holder is live. Each streamer is processed at most once per calendar day.
LIVE_POLL_INTERVAL: 120

# A live task sends one 300-click like report, then runs these two jobs in
# parallel for that stream.
WATCHINGLIVE: 30
WATCHINGLIVE_CD: 60
DANMAKU_COUNT: 10
DANMAKU_CD: 180
