services:
  bilibili-live-helper:
    build:
      context: .
    image: local/bilibili-live-helper:latest
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      BILIBILI_LIVE_HELPER_CONFIG: /app/users.yaml
      BILIBILI_LIVE_HELPER_STATE: /data/state.json
    volumes:
      - type: bind
        source: ./users.yaml
        target: /app/users.yaml
        read_only: true
      - type: bind
        source: ./data
        target: /data
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-m", "bilibili_live_helper.healthcheck"]
      interval: 60s
      timeout: 15s
      start_period: 45s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
